name: RECOVERY

on:
  workflow_dispatch:
    inputs:
      RECOVERY_URL:
        description: 'RECOVERY URL'
        required: true
        default: 'https://files.catbox.moe/xxxxxx'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Quan trọng để upload Release

    steps:
    - name: Check Out
      uses: actions/checkout@v4

    - name: Prepare the environment
      run: |
        sudo apt update
        sudo apt install git wget lz4 tar openssl python3 python3-pip -y

    - name: Fetch image from URL
      run: |
        wget "${{ github.event.inputs.RECOVERY_URL }}" -O recovery.img

    - name: Patch Process
      run: |
        # Cấp quyền cho các file thực thi có sẵn trong repo
        chmod +x script1.sh script2.sh magiskboot avbtool
        
        # Chạy script patch
        ./script1.sh recovery.img || true
        ./script2.sh || true
        
        # Xử lý AVB Tool (Đảm bảo các file .pem tồn tại trong repo)
        python3 avbtool extract_public_key --key phh.pem --output phh.pub.bin
        
        # Lưu ý: Kiểm tra chính xác tên file output của script2.sh là gì 
        # Giả sử output là recovery-patched.img
        python3 avbtool add_hash_footer \
          --partition_name recovery \
          --partition_size $(stat -c%s recovery.img) \
          --image recovery-patched.img \
          --key phh.pem \
          --algorithm SHA256_RSA4096
        
        # Đóng gói cho Odin (Samsung)
        mkdir -p output
        cp recovery-patched.img output/recovery.img
        cd output
        tar -cvf fastbootd-recovery.tar recovery.img
        # Tạo chuẩn .tar.md5:
        md5sum -b fastbootd-recovery.tar > fastbootd-recovery.tar.md5
        # Lưu ý: Odin cần md5 append vào file tar thực tế, 
        # nhưng cách đơn giản nhất là:
        mv fastbootd-recovery.tar fastbootd-recovery.img.tar

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: output/*
        name: Patched-Recovery-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
