name: RECOVERY

on:
  workflow_dispatch:
    inputs:
      RECOVERY_URL:
        description: 'RECOVERY URL'
        required: true
        default: 'https://files.catbox.moe/(RECOMMENDED)'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check Out
      uses: actions/checkout@v4

    - name: Prepare the environment
      run: |
        sudo apt update
        sudo apt install git wget lz4 tar openssl python3 -y

    - name: Fetch image from URL
      run: |
        ls
        pwd
        wget "${{ github.event.inputs.RECOVERY_URL }}" -O recovery.img

    - name: Patch Process-1
      run: |
        chmod +x script1.sh
        chmod +x magiskboot
        ./script1.sh recovery.img || true

    - name: Patch Process-2
      run: |
        chmod +x script2.sh
        ./script2.sh || true

        echo "=== FILES AFTER PATCH ==="
        ls -lah

        # Script tạo new-boot.img
        if [ -f "new-boot.img" ]; then
          mv new-boot.img recovery-patched.img
        fi

        # Check file tồn tại
        if [ ! -f "recovery-patched.img" ]; then
          echo "recovery-patched.img not found!"
          exit 1
        fi

        # Extract AVB public key
        python3 avbtool extract_public_key \
          --key phh.pem \
          --output phh.pub.bin

        # Add AVB footer
        python3 avbtool add_hash_footer \
          --partition_name recovery \
          --partition_size $(wc -c recovery.img | cut -f1 -d' ') \
          --image recovery-patched.img \
          --key phh.pem \
          --algorithm SHA256_RSA4096

        mkdir -p output

        # Rename final image
        cp recovery-patched.img output/recovery.img

        cd output

        # Create Odin flashable tar
        tar cvf fastbootd-recovery.tar recovery.img

        # Add md5 for Odin
        md5sum -t fastbootd-recovery.tar >> fastbootd-recovery.tar
        mv fastbootd-recovery.tar fastbootd-recovery.tar.md5

        echo "=== OUTPUT FILES ==="
        ls -lah

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: output/*.md5
        name: Patched-Recovery
        tag_name: ${{ github.run_id }}
